<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#060E1C"/>
      <stop offset="100%" stop-color="#0D2150"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="60%" r="50%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#38BDF8" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Road line -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#38BDF8" stroke-width="1.2" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="900" fill="#F0F8FF" letter-spacing="-2">
    Tech<tspan fill="#38BDF8">Agency</tspan>
  </text>

  <!-- Tagline -->
  <text x="82" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#F0F8FF" opacity="0.45">
    Africa's Digital Product Studio
  </text>

  <!-- Sub-copy -->
  <text x="82" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#F0F8FF" opacity="0.3">
    Web · Mobile · Fintech · AI · DevOps · Lagos-based
  </text>

  <!-- Domain badge -->
  <rect x="80" y="430" width="220" height="40" rx="20" fill="#38BDF8" opacity="0.12"/>
  <text x="190" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#38BDF8" text-anchor="middle" font-weight="600">
    techagency.africa
  </text>
</svg>
